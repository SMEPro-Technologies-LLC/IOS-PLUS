name: CD — GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  IMAGE_NAME: ios-plus
  DELIVERY_PIPELINE: ios-plus-pipeline

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      is_tag: ${{ steps.set-env.outputs.is_tag }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'staging'
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup GCP Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get GKE credentials — Staging
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ios-plus-staging
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply — Staging
        run: terraform apply -auto-approve -var="environment=staging"
        working-directory: infra/terraform

      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create "release-${{ github.run_id }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --images="ios-plus=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --source="infra/cloud-deploy" \
            --description="Release ${{ github.sha }}"

      - name: Promote to Staging
        run: |
          gcloud deploy releases promote \
            --release="release-${{ github.run_id }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --to-target="staging" \
            --quiet

      - name: Smoke tests — Staging
        run: |
          set -e
          echo "Running smoke tests against staging..."
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://staging.app.ioscos.com/health"

          kubectl rollout status deployment/ios-plus -n ios-plus-staging --timeout=300s

          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            --env="PGPASSWORD=${{ secrets.STAGING_DB_PASSWORD || '' }}" \
            -- psql "$STAGING_DATABASE_URL" -c "SELECT 1;"

          kubectl run worm-smoke --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://staging.app.ioscos.com/api/v1/worm/status"
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Smoke tests failed. Initiating rollback..."
          gcloud deploy rollouts abandon \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --release="release-${{ github.run_id }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --rollout="release-${{ github.run_id }}-to-staging" \
            --quiet || true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'production'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://app.ioscos.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup GCP Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get GKE credentials — Production
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ios-plus-production
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply — Production
        run: terraform apply -auto-approve -var="environment=production"
        working-directory: infra/terraform

      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create "release-${{ github.run_id }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --images="ios-plus=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --source="infra/cloud-deploy" \
            --description="Release ${{ github.sha }}"

      - name: Promote to Production (Canary)
        run: |
          gcloud deploy releases promote \
            --release="release-${{ github.run_id }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --to-target="production" \
            --quiet

      - name: Wait for canary 25%
        run: sleep 60

      - name: Smoke tests — Production 25% Canary
        run: |
          set -e
          echo "Smoke tests against production canary 25%..."
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health"

          kubectl rollout status deployment/ios-plus -n ios-plus-production --timeout=300s

          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            --env="PGPASSWORD=${{ secrets.PROD_DB_PASSWORD || '' }}" \
            -- psql "$PROD_DATABASE_URL" -c "SELECT 1;"

          kubectl run worm-smoke --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/api/v1/worm/status"
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Smoke tests failed. Initiating rollback..."
          gcloud deploy rollouts abandon \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --release="release-${{ github.run_id }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --rollout="release-${{ github.run_id }}-to-production" \
            --quiet || true

      - name: Wait for canary 50%
        run: sleep 60

      - name: Smoke tests — Production 50% Canary
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health"

      - name: Wait for canary 75%
        run: sleep 60

      - name: Smoke tests — Production 75% Canary
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health"

      - name: Wait for canary 100%
        run: sleep 60

      - name: Smoke tests — Production 100%
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health"

          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            --env="PGPASSWORD=${{ secrets.PROD_DB_PASSWORD || '' }}" \
            -- psql "$PROD_DATABASE_URL" -c "SELECT 1;"

          kubectl run worm-smoke --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/api/v1/worm/status"
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
