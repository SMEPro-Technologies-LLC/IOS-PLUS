name: CD — GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - 'v*'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  IMAGE_NAME: ios-plus
  DELIVERY_PIPELINE: ios-plus-pipeline
  SKAFFOLD_FILE: infra/cloud-deploy/skaffold.yaml

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      is_tag: ${{ steps.set-env.outputs.is_tag }}
      release_name: ${{ steps.set-env.outputs.release_name }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "release_name=release-${{ github.run_id }}-${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "release_name=release-${{ github.run_id }}-staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "release_name=release-${{ github.run_id }}-staging" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'staging'
    permissions:
      contents: read
      id-token: write
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup GCP Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply — Staging
        run: terraform apply -auto-approve -var="environment=staging"
        working-directory: infra/terraform

      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create "${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --images="ios-plus=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --source="infra/cloud-deploy" \
            --description="Release ${{ github.sha }}"

      - name: Promote to Staging
        run: |
          gcloud deploy releases promote \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --to-target="staging" \
            --quiet

      - name: Get GKE credentials — Staging
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          cluster_name: ios-plus-staging
          location: ${{ secrets.GCP_REGION }}

      - name: Smoke tests — Staging
        run: |
          set -e
          echo "Running smoke tests against staging..."
          # Health check
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://staging.app.ioscos.com/health" || exit 1

          # Ready check
          kubectl rollout status deployment/ios-plus -n ios-plus-staging --timeout=300s

          # DB connectivity
          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            -- psql "$STAGING_DATABASE_URL" -c "SELECT 1;" || exit 1

          # WORM verification
          kubectl run worm-smoke --rm -i --restart=Never \
            --image=busybox:1.36 \
            -- wget -qO- "https://staging.app.ioscos.com/api/v1/worm/status" || exit 1
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Smoke tests failed. Initiating rollback..."
          ROLLOUT=$(gcloud deploy rollouts list \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='targetId:staging' \
            --sort-by=~createTime \
            --format='value(name)' | head -n 1)

          if [ -n "$ROLLOUT" ]; then
            gcloud deploy rollouts cancel "$ROLLOUT" \
              --release="${{ needs.determine-environment.outputs.release_name }}" \
              --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
              --region="${{ secrets.GCP_REGION }}" \
              --quiet
          else
            echo "No staging rollout found for ${{ needs.determine-environment.outputs.release_name }}; skipping rollback."
          fi

      # - name: Notify Slack — Success
      #   if: success()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {"text": "✅ IOS+ deployed to staging: ${{ github.sha }}"}
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # - name: Notify Slack — Failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {"text": "❌ IOS+ staging deployment FAILED: ${{ github.sha }}"}
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'production'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://app.ioscos.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup GCP Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform

      - name: Terraform Apply — Production
        run: terraform apply -auto-approve -var="environment=production"
        working-directory: infra/terraform

      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create "${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --images="ios-plus=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --source="infra/cloud-deploy" \
            --description="Release ${{ github.sha }}"

      - name: Promote to Production (Canary)
        run: |
          gcloud deploy releases promote \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --to-target="production" \
            --quiet

      - name: Get GKE credentials — Production
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          cluster_name: ios-plus-production
          location: ${{ secrets.GCP_REGION }}

      - name: Wait for canary 25%
        run: sleep 60

      - name: Smoke tests — Production 25% Canary
        run: |
          set -e
          echo "Smoke tests against production canary 25%..."
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health" || exit 1

          kubectl rollout status deployment/ios-plus -n ios-plus-production --timeout=300s

          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            -- psql "$PROD_DATABASE_URL" -c "SELECT 1;" || exit 1

          kubectl run worm-smoke --rm -i --restart=Never \
            --image=busybox:1.36 \
            -- wget -qO- "https://app.ioscos.com/api/v1/worm/status" || exit 1
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Smoke tests failed. Initiating rollback..."
          ROLLOUT=$(gcloud deploy rollouts list \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='targetId:production' \
            --sort-by=~createTime \
            --format='value(name)' | head -n 1)

          if [ -n "$ROLLOUT" ]; then
            gcloud deploy rollouts cancel "$ROLLOUT" \
              --release="${{ needs.determine-environment.outputs.release_name }}" \
              --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
              --region="${{ secrets.GCP_REGION }}" \
              --quiet
          else
            echo "No production rollout found for ${{ needs.determine-environment.outputs.release_name }}; skipping rollback."
          fi

      - name: Wait for canary 50%
        run: sleep 60

      - name: Smoke tests — Production 50% Canary
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health" || exit 1

      - name: Rollback on failure (50%)
        if: failure()
        run: |
          ROLLOUT=$(gcloud deploy rollouts list \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='targetId:production' \
            --sort-by=~createTime \
            --format='value(name)' | head -n 1)

          if [ -n "$ROLLOUT" ]; then
            gcloud deploy rollouts cancel "$ROLLOUT" \
              --release="${{ needs.determine-environment.outputs.release_name }}" \
              --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
              --region="${{ secrets.GCP_REGION }}" \
              --quiet
          else
            echo "No production rollout found for ${{ needs.determine-environment.outputs.release_name }}; skipping rollback."
          fi

      - name: Wait for canary 75%
        run: sleep 60

      - name: Smoke tests — Production 75% Canary
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health" || exit 1

      - name: Rollback on failure (75%)
        if: failure()
        run: |
          ROLLOUT=$(gcloud deploy rollouts list \
            --release="${{ needs.determine-environment.outputs.release_name }}" \
            --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='targetId:production' \
            --sort-by=~createTime \
            --format='value(name)' | head -n 1)

          if [ -n "$ROLLOUT" ]; then
            gcloud deploy rollouts cancel "$ROLLOUT" \
              --release="${{ needs.determine-environment.outputs.release_name }}" \
              --delivery-pipeline="${{ env.DELIVERY_PIPELINE }}" \
              --region="${{ secrets.GCP_REGION }}" \
              --quiet
          else
            echo "No production rollout found for ${{ needs.determine-environment.outputs.release_name }}; skipping rollback."
          fi

      - name: Wait for canary 100%
        run: sleep 60

      - name: Smoke tests — Production 100%
        run: |
          set -e
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -- curl -fsS --retry 5 --retry-delay 5 \
            "https://app.ioscos.com/health" || exit 1

          kubectl run db-smoke --rm -i --restart=Never \
            --image=postgres:16-alpine \
            -- psql "$PROD_DATABASE_URL" -c "SELECT 1;" || exit 1

          kubectl run worm-smoke --rm -i --restart=Never \
            --image=busybox:1.36 \
            -- wget -qO- "https://app.ioscos.com/api/v1/worm/status" || exit 1
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

