name: CD — Staging Deployment

on:
  push:
    branches: [develop]

env:
  NODE_VERSION: "20.12.2"
  CLUSTER_NAME: ios-plus-staging
  NAMESPACE: ios-plus-staging

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.smeprotech.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push all images
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for pkg in middleware-engine gate-530 evidence-fabric rag-vault cos-plus uco-resolver; do
            docker build               -f docker/Dockerfile.$pkg               -t registry.smeprotech.com/smepro/ios-plus-$pkg:$TAG               -t registry.smeprotech.com/smepro/ios-plus-$pkg:staging-latest               .
            docker push registry.smeprotech.com/smepro/ios-plus-$pkg:$TAG
            docker push registry.smeprotech.com/smepro/ios-plus-$pkg:staging-latest
          done

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Helm upgrade staging
        run: |
          helm upgrade --install ios-plus infra/helm/ios-plus/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/helm/ios-plus/values.yaml \
            --set global.imageRegistry=registry.smeprotech.com \
            --set middlewareEngine.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set gate530.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set evidenceFabric.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set ragVault.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --atomic \
            --timeout 10m

      - name: Smoke test
        run: |
          kubectl wait --for=condition=ready pod -l app=middleware-engine \
            -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl get pods -n ${{ env.NAMESPACE }}
