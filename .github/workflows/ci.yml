name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.19.0]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Helm lint
        run: helm lint infra/helm/ios-plus

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: iosplus
          POSTGRES_PASSWORD: iosplus
          POSTGRES_DB: iosplus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      vault:
        image: hashicorp/vault:1.16
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
        ports:
          - 8200:8200
        options: >-
          --cap-add IPC_LOCK
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://iosplus:iosplus@localhost:5432/iosplus_test
      - name: Verify WORM
        run: npm run db:verify-worm
        env:
          DATABASE_URL: postgresql://iosplus:iosplus@localhost:5432/iosplus_test
      - name: Run tests
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://iosplus:iosplus@localhost:5432/iosplus_test
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-root-token
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
