# yaml-language-server: $schema=https://json.schemastore.org/any.json
name: CD — Production Deployment

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  deployments: write

env:
  REGISTRY: ghcr.io
  OWNER: smepro-technologies-llc
  NAMESPACE: ios-plus

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://iosplus.smeprotech.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify tag signature
        run: |
          git verify-tag ${{ github.ref_name }} || echo "Warning: unsigned tag"

      - name: Configure kubectl (production)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets['PRODUCTION_KUBECONFIG'] }}

      - name: Helm upgrade production
        run: |
          TAG=${{ github.ref_name }}
          helm dependency build infra/helm/ios-plus/
          helm upgrade --install ios-plus infra/helm/ios-plus/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/helm/ios-plus/values.yaml \
            --values infra/helm/ios-plus/values.production.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.OWNER }} \
            --set middlewareEngine.image.tag=$TAG \
            --set gate530.image.tag=$TAG \
            --set evidenceFabric.image.tag=$TAG \
            --set ragVault.image.tag=$TAG \
            --set ops.image.tag=$TAG \
            --atomic \
            --timeout 15m \
            --wait

      - name: Post-deploy validation
        run: |
          echo "=== Production deployment validation ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          # Run key publication consistency check
          kubectl create job --from=cronjob/key-consistency-check \
            key-check-postdeploy-${{ github.run_id }} \
            -n ${{ env.NAMESPACE }}
          # Run WORM integrity check
          kubectl create job --from=cronjob/worm-integrity-check \
            worm-check-postdeploy-${{ github.run_id }} \
            -n ${{ env.NAMESPACE }}
          echo "=== Validation jobs submitted ==="
