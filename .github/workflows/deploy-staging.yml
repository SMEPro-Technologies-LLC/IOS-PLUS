name: CD — Staging Deployment

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  OWNER: smepro-technologies-llc
  NAMESPACE: ios-plus-staging

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Staging Images
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for pkg in middleware-engine gate-530 evidence-fabric rag-vault cos-plus uco-resolver ops; do
            echo "=== Building and pushing package (staging): $pkg ==="
            docker build \
              -f docker/Dockerfile.$pkg \
              -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ios-plus-$pkg:$TAG \
              -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ios-plus-$pkg:staging-latest \
              .
            
            docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/ios-plus-$pkg:$TAG
            docker push ${{ env.REGISTRY }}/${{ env.OWNER }}/ios-plus-$pkg:staging-latest
          done

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.smeprotech.com  # Native environment URL tracking

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Helm upgrade staging
        run: |
          helm dependency build infra/helm/ios-plus/
          helm upgrade --install ios-plus infra/helm/ios-plus/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/helm/ios-plus/values.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.OWNER }} \
            --set middlewareEngine.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set gate530.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set evidenceFabric.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set ragVault.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set ops.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --atomic \
            --timeout 10m

      - name: Smoke test
        run: |
          kubectl wait --for=condition=ready pod -l app=middleware-engine \
            -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl get pods -n ${{ env.NAMESPACE }}
