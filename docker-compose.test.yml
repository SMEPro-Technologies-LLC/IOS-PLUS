services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: ios-plus-test-runner
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://iosplus:iosplus@test-postgres:5432/iosplus_test
      - VAULT_ADDR=http://test-vault:8200
      - VAULT_TOKEN=dev-root-token
      - EVIDENCE_SIGNING_MODE=local
    depends_on:
      test-postgres:
        condition: service_healthy
      test-vault:
        condition: service_started
    networks:
      - ios-plus-test
    volumes:
      - ./coverage:/app/coverage
      - ./.audit-artifacts:/app/.audit-artifacts

  test-postgres:
    image: pgvector/pgvector:pg16
    container_name: ios-plus-test-postgres
    environment:
      POSTGRES_USER: iosplus
      POSTGRES_PASSWORD: iosplus
      POSTGRES_DB: iosplus_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iosplus -d iosplus_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ios-plus-test

  test-vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    networks:
      - ios-plus-test
    command: server -dev -dev-root-token-id="dev-root-token"

networks:
  ios-plus-test:
    driver: bridge
