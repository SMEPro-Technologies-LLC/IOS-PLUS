# ============================================================
# IOS+ Local Development Environment
# docker compose up -d
# SMEPro Technologies — EB Doc 6 §3.1
# ============================================================

services:
  # COS+ Database — PostgreSQL 16 + pgvector + pgaudit
  cos-plus:
    image: pgvector/pgvector:pg16
    container_name: cos-plus
    environment:
      POSTGRES_DB: ios_plus
      POSTGRES_USER: cos_admin
      POSTGRES_PASSWORD: ${COS_DB_PASSWORD_COS_ADMIN}
    ports:
      - "5432:5432"
    volumes:
      - cos_plus_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_buffers=2GB
        -c wal_level=replica
        -c archive_timeout=900
        -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cos_admin -d ios_plus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis HA (single-node for dev; 3-node cluster in production)
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HashiCorp Vault (dev mode — transit engine for signing keys)
  vault-dev:
    image: hashicorp/vault:1.16
    container_name: vault-dev
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flyway — runs all V1–V4 migrations on startup
  flyway:
    image: flyway/flyway:10
    container_name: flyway
    command: -url=jdbc:postgresql://cos-plus:5432/ios_plus -user=cos_admin -password=${COS_DB_PASSWORD_COS_ADMIN} migrate -baselineOnMigrate=true -baselineVersion=4
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      cos-plus:
        condition: service_healthy

  # Gate 530 sidecar (standalone for local testing)
  gate-530:
    build:
      context: .
      dockerfile: docker/Dockerfile.gate-530
    container_name: gate-530
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GATE530_IPC_SOCKET: /tmp/gate530.sock
      ESCALATION_LADDER_LIMIT: 3
      ESCALATION_LADDER_WINDOW_SECONDS: 60
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - gate530_socket:/tmp

  # Middleware Engine
  middleware-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.middleware-engine
    container_name: middleware-engine
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      LOG_LEVEL: debug
      # COS+ connection registry (one pool per role)
      COS_HOST: cos-plus
      COS_PORT: 5432
      COS_DATABASE: ios_plus
      COS_SSL: "false"
      COS_PASSWORD_IOS_APP: ${COS_DB_PASSWORD_IOS_APP}
      COS_PASSWORD_AUDIT_WRITER: ${COS_DB_PASSWORD_AUDIT_WRITER}
      COS_PASSWORD_AUDIT_READER: ${COS_DB_PASSWORD_AUDIT_READER}
      COS_PASSWORD_RAG_READER: ${COS_DB_PASSWORD_RAG_READER}
      COS_PASSWORD_RAG_WRITER: ${COS_DB_PASSWORD_RAG_WRITER}
      COS_PASSWORD_COS_ADMIN: ${COS_DB_PASSWORD_COS_ADMIN}
      # UCO Resolver — rag_reader role DSN
      COS_URL_RAG_READER: postgresql://rag_reader:${COS_DB_PASSWORD_RAG_READER}@cos-plus:5432/ios_plus
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Vault — transit signing
      VAULT_ADDR: http://vault-dev:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_TRANSIT_KEY_PATH: ${VAULT_TRANSIT_KEY_PATH}
      # Ed25519 signing key (base64-encoded private key bytes)
      SIGNING_KEY_PRIVATE_BASE64: ${SIGNING_KEY_PRIVATE_BASE64}
      SIGNING_KEY_PUBKEY_PATH: /run/secrets/signing-pubkey.pem
      SIGNING_KEY_DNS_ZONE: ${SIGNING_KEY_DNS_ZONE}
      SIGNING_KEY_ACTIVE_ID: ${SIGNING_KEY_ACTIVE_ID}
      # OpenAI — RAG Vault embeddings
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAG_EMBEDDING_MODEL: text-embedding-3-large
      RAG_EMBEDDING_DIM: 3072
      RAG_MAX_CHUNKS: 8
      RAG_SIMILARITY_THRESHOLD: "0.75"
      # Tenant NAICS profile (L3 UCO resolution)
      TENANT_ID: ${TENANT_ID}
      TENANT_NAICS_CODES: ${TENANT_NAICS_CODES}
      TENANT_SIC_CODES: ${TENANT_SIC_CODES}
      TENANT_CIP_CODES: ${TENANT_CIP_CODES}
      TENANT_SOC_CODES: ${TENANT_SOC_CODES}
      TENANT_ISIC_CODES: ${TENANT_ISIC_CODES}
      TENANT_HS_HTS_CODES: ${TENANT_HS_HTS_CODES}
      TENANT_NAICS_EFFECTIVE_DATE: ${TENANT_NAICS_EFFECTIVE_DATE:-2026-01-01}
    depends_on:
      cos-plus:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-dev:
        condition: service_healthy
      gate-530:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    volumes:
      - gate530_socket:/tmp

volumes:
  cos_plus_data:
  gate530_socket:
