apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: production
  labels:
    app: ios-plus
    wave: wave1
    environment: production
    managed-by: cloud-deploy
  annotations:
    canary.strategy: "25-50-75-100"
    rollback.enabled: "true"
spec:
  gke:
    cluster: projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/clusters/ios-plus-production
  executionConfigs:
    - usages:
        - RENDER
        - DEPLOY
        - VERIFY
      artifactStorage:
        defaultPool:
          serviceAccount: ${GCP_SERVICE_ACCOUNT}
      serviceAccount: ${GCP_SERVICE_ACCOUNT}
  requireApproval: true
  description: |
    Wave 1 MVP production target.
    Canary deployment: 25% → 50% → 75% → 100%.
    Automated rollback on verification failure.
    Manual approval required before initial promotion from staging.
