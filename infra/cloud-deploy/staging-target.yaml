apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
  labels:
    app: ios-plus
    environment: staging
    managed-by: cloud-deploy
spec:
  gke:
    cluster: projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/clusters/ios-plus-staging
  executionConfigs:
    - usages:
        - RENDER
        - DEPLOY
      artifactStorage:
        defaultPool:
          serviceAccount: ${GCP_SERVICE_ACCOUNT}
      serviceAccount: ${GCP_SERVICE_ACCOUNT}
  requireApproval: false
  description: |
    Staging target for IOS+.
    Direct 100% deployment with no canary.
    Used for integration testing and QA validation before promotion to production.
