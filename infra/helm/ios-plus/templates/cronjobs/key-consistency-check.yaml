apiVersion: batch/v1
kind: CronJob
metadata:
  name: key-consistency-check
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cronJobs.keyConsistencyCheck.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: key-check
              image: "{{ .Values.cronJobs.keyConsistencyCheck.image.repository }}:{{ .Values.cronJobs.keyConsistencyCheck.image.tag }}"
              command: ["python3", "scripts/ops/verify_key_publication_consistency.py"]
              env:
                - name: DATABASE_URL_AUDIT_READER
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-db-secrets
                      key: audit-reader-url
                - name: KEY_FILESYSTEM_PATH
                  value: "/etc/ios-plus/keys/current.pub"
                - name: DNS_TXT_ZONE
                  valueFrom:
                    configMapKeyRef:
                      name: ios-plus-config
                      key: DNS_TXT_ZONE
          serviceAccountName: ios-plus-sa
