apiVersion: batch/v1
kind: CronJob
metadata:
  name: key-consistency-check
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cronJobs.keyConsistencyCheck.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ios-plus"
            vault.hashicorp.com/agent-inject-secret-ios-plus.env: "secret/data/ios-plus/config"
            vault.hashicorp.com/agent-inject-template-ios-plus.env: |
              {{ "{{" }}- with secret "secret/data/ios-plus/config" -{{ "}}" }}
              {{ "{{" }}- range $k, $v := .Data.data -{{ "}}" }}
              {{ "{{" }} $k -{{ "}}" }}={{ "{{" }} $v | quote -{{ "}}" }}
              {{ "{{" }}- end -{{ "}}" }}
              {{ "{{" }}- end -{{ "}}" }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: key-check
              image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.cronJobs.keyConsistencyCheck.image.repository }}:{{ .Values.cronJobs.keyConsistencyCheck.image.tag }}"
              command: ["python3", "scripts/ops/verify_key_publication_consistency.py"]
              env:
                - name: NODE_ENV
                  value: "production"
                - name: KEY_FILESYSTEM_PATH
                  value: "/etc/ios-plus/keys/current.pub"
                - name: DNS_TXT_ZONE
                  valueFrom:
                    configMapKeyRef:
                      name: ios-plus-config
                      key: DNS_TXT_ZONE
          serviceAccountName: ios-plus-sa
