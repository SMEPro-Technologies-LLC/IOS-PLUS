apiVersion: batch/v1
kind: CronJob
metadata:
  name: merkle-root-publisher
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cronJobs.merkleRootPublisher.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: merkle-publisher
              image: "{{ .Values.cronJobs.merkleRootPublisher.image.repository }}:{{ .Values.cronJobs.merkleRootPublisher.image.tag }}"
              command: ["python3", "scripts/ops/verify_merkle_root.py"]
              env:
                - name: DATABASE_URL_AUDIT_READER
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-db-secrets
                      key: audit-reader-url
                - name: DNS_TXT_ZONE
                  valueFrom:
                    configMapKeyRef:
                      name: ios-plus-config
                      key: DNS_TXT_ZONE
          serviceAccountName: ios-plus-sa
