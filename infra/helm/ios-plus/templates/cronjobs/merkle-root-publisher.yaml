apiVersion: batch/v1
kind: CronJob
metadata:
  name: merkle-root-publisher
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cronJobs.merkleRootPublisher.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "ios-plus"
            vault.hashicorp.com/agent-inject-secret-ios-plus.env: "secret/data/ios-plus/config"
            vault.hashicorp.com/agent-inject-template-ios-plus.env: |
              {{ "{{" }}- with secret "secret/data/ios-plus/config" -{{ "}}" }}
              {{ "{{" }}- range $k, $v := .Data.data -{{ "}}" }}
              {{ "{{" }} $k -{{ "}}" }}={{ "{{" }} $v | quote -{{ "}}" }}
              {{ "{{" }}- end -{{ "}}" }}
              {{ "{{" }}- end -{{ "}}" }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: merkle-publisher
              image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.cronJobs.merkleRootPublisher.image.repository }}:{{ .Values.cronJobs.merkleRootPublisher.image.tag }}"
              command: ["python3", "/scripts/verify_merkle_root.py"]
              envFrom:
                - configMapRef:
                    name: ios-plus-config
              env:
                - name: NODE_ENV
                  value: "production"
                - name: DATABASE_URL_AUDIT_READER
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-db-secrets
                      key: audit-reader-url
                - name: DATABASE_URL_AUDIT_WRITER
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-db-secrets
                      key: audit-writer-url
          serviceAccountName: ios-plus-sa
