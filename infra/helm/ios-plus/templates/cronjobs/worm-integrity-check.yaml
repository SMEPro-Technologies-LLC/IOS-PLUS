apiVersion: batch/v1
kind: CronJob
metadata:
  name: worm-integrity-check
  namespace: {{ .Values.global.namespace }}
spec:
  schedule: {{ .Values.cronJobs.wormIntegrityCheck.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: worm-check
              image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.cronJobs.wormIntegrityCheck.image.repository }}:{{ .Values.cronJobs.wormIntegrityCheck.image.tag }}"
              command: ["python3", "/scripts/weekly_worm_check.py"]
              envFrom:
                - configMapRef:
                    name: ios-plus-config
              env:
                - name: DATABASE_URL_AUDIT_READER
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-db-secrets
                      key: audit-reader-url
                - name: DATABASE_URL_IOS_APP
                  valueFrom:
                    secretKeyRef:
                      name: cos-plus-app
                      key: dsn
          serviceAccountName: ios-plus-sa
