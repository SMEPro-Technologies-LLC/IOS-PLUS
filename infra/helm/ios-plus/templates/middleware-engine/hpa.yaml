{{- if .Values.middlewareEngine.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: middleware-engine-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: middleware-engine
  minReplicas: {{ .Values.middlewareEngine.hpa.minReplicas }}
  maxReplicas: {{ .Values.middlewareEngine.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.middlewareEngine.hpa.targetCPUUtilizationPercentage }}
{{- end }}
