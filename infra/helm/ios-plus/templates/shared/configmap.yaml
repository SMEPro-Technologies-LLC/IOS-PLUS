apiVersion: v1
kind: ConfigMap
metadata:
  name: ios-plus-config
  namespace: {{ .Values.global.namespace }}
data:
  GATE530_IPC_SOCKET: {{ .Values.gate530.config.ipcSocketPath | quote }}
  GATE530_TIMEOUT_MS: {{ .Values.gate530.config.timeoutMs | quote }}
  GATE530_FAIL_CLOSED: {{ .Values.gate530.config.failClosedOnTimeout | quote }}
  RAG_EMBEDDING_MODEL: {{ .Values.ragVault.config.embeddingModel | quote }}
  RAG_EMBEDDING_DIMS:  {{ .Values.ragVault.config.embeddingDimensions | quote }}
  RAG_MAX_CHUNKS:      {{ .Values.ragVault.config.maxChunksPerQuery | quote }}
  RAG_SIM_THRESHOLD:   {{ .Values.ragVault.config.similarityThreshold | quote }}
  VAULT_ADDR:          {{ .Values.evidenceFabric.vault.addr | quote }}
  VAULT_KEY_PATH:      {{ .Values.evidenceFabric.vault.keyPath | quote }}
  DNS_TXT_ZONE:        {{ .Values.secrets.dnsTxtZone | quote }}
  {{- if .Values.extraConfig }}
  {{- toYaml .Values.extraConfig | nindent 2 }}
  {{- end }}

