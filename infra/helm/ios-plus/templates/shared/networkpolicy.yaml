apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ios-plus-network-policy
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ios-plus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
    - ports:
        - port: 443
        - port: 8200   # HashiCorp Vault
        - port: 5432   # PostgreSQL
