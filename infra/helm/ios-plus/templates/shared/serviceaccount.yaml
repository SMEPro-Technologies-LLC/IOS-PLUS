apiVersion: v1
kind: ServiceAccount
metadata:
  name: ios-plus-sa
  namespace: {{ .Values.global.namespace }}
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "ios-plus"
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ios-plus.serviceAccountName" . }}-ops
  namespace: {{ .Values.global.namespace }}
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "ios-plus"

