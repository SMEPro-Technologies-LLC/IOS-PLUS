# ============================================================
# IOS+ Production Overrides
# Merge with: helm upgrade --values values.production.yaml
# All secret values injected by Vault Agent at deploy time
# ============================================================

global:
  imageRegistry: "ghcr.io/smepro-technologies-llc"

middlewareEngine:
  replicaCount: 3
  image:
    pullPolicy: Always
  hpa:
    minReplicas: 3
    maxReplicas: 20

evidenceFabric:
  replicaCount: 2
  vault:
    addr: "https://vault.smeprotech.com:8200"
    keyPath: "transit/keys/ios-evidence-signing-production"

ragVault:
  replicaCount: 2

cosPlus:
  persistence:
    storageClass: "premium-ssd-retain"
    size: 500Gi

redis:
  replica:
    replicaCount: 3

serviceAccount:
  annotations:
    # For GCP Workload Identity (uncomment and replace with your GCP service account):
    # iam.gke.io/gcp-service-account: "ios-plus-sa@YOUR_GCP_PROJECT.iam.gserviceaccount.com"
    # For AWS EKS IRSA (uncomment and replace with your AWS IAM Role ARN):
    # eks.amazonaws.com/role-arn: "arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/ios-plus-dns-publisher-role"

