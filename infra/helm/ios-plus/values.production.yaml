# ============================================================
# IOS+ Production Overrides
# Merge with: helm upgrade --values values.production.yaml
# All secret values injected by Vault Agent at deploy time
# ============================================================

global:
  imageRegistry: "registry.smeprotech.com"

middlewareEngine:
  replicaCount: 3
  image:
    pullPolicy: Always
  hpa:
    minReplicas: 3
    maxReplicas: 20

evidenceFabric:
  replicaCount: 2
  vault:
    addr: "https://vault.smeprotech.com:8200"
    keyPath: "transit/keys/ios-evidence-signing-production"

ragVault:
  replicaCount: 2

cosPlus:
  persistence:
    storageClass: "premium-ssd-retain"
    size: 500Gi

redis:
  replica:
    replicaCount: 3
