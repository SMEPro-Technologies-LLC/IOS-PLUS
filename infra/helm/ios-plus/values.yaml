replicaCount: 2

image:
  repository: ios-plus
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ios-plus
          topologyKey: kubernetes.io/hostname

env:
  DATABASE_URL: "postgresql://ios-plus:{{ .Values.secrets.databasePassword }}@postgres:5432/ios-plus"
  VAULT_ADDR: "http://vault:8200"
  VAULT_NAMESPACE: "admin"
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  PORT: "3001"
  METRICS_PORT: "9090"
  EVIDENCE_SIGNING_ENABLED: "true"
  AUDIT_WORM_ENABLED: "true"
  RAG_EMBEDDING_PROVIDER: "vertex"
  COMPLIANCE_ENGINE_MODE: "enforcement"
  GATE530_RULE_REFRESH_INTERVAL: "300"
  LICENSURE_LOOKUP_TIMEOUT: "5000"
  COS_PLUS_CACHE_TTL: "60"

secrets:
  vaultAgentInjection: true
  vaultRole: ios-plus
  vaultPath: secret/ios-plus
  databasePassword: ""
  jwtSecret: ""
  apiKey: ""

readinessProbe:
  httpGet:
    path: /ready
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress: []
