# ============================================================================
# IOS+ Platform — Connector Ingestion Workers
# ============================================================================
# Campus system connectors, regulatory crawlers, and AI service connectors.
# Requires Pub/Sub publisher permissions and Cloud SQL access for staging
# ingested records. No ingress; triggered by Cloud Scheduler, Pub/Sub, or
# internal admin API.
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ios-plus-connector
  namespace: connector-ingestion
  labels:
    app.kubernetes.io/name: ios-plus-connector
    app.kubernetes.io/component: connector-ingestion
    app.kubernetes.io/version: "v2.0.0"
    cost-center: lamar-cos
    tier: ingestion
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ios-plus-connector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ios-plus-connector
        app.kubernetes.io/component: connector-ingestion
        app.kubernetes.io/version: "v2.0.0"
        cost-center: lamar-cos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ios-plus-connector-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ios-plus-connector
          image: ios-plus-connector
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ios-plus-connector-secrets
                  key: DATABASE_URL
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: ios-plus-connector-secrets
                  key: REDIS_HOST
            - name: PUBSUB_PROJECT_ID
              value: "lamar-cos"
            - name: PUBSUB_TOPIC_INGESTION
              value: "ios-plus-ingestion-events"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp

        - name: cloudsql-auth-proxy
          image: cloudsql-auth-proxy
          imagePullPolicy: Always
          command:
            - "/cloud-sql-proxy"
            - "--private-ip"
            - "--structured-logs"
            - "--port=5432"
            - "lamar-cos:us-central1:cos-db"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - name: cloudsql
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ios-plus-connector
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: ios-plus-connector
  namespace: connector-ingestion
  labels:
    app.kubernetes.io/name: ios-plus-connector
    cost-center: lamar-cos
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ios-plus-connector
  ports:
    - name: http
      port: 3000
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
