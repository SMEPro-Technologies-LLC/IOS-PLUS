  afterMigrate.sql: |
    -- ============================================================
    -- IOS+ Database Post-Migration Invariants Verification
    -- Executed automatically by Flyway upon successful migration.
    -- If any check fails, throws exception causing the job to exit non-zero.
    -- ============================================================

    -- 1. Check required tables exist
    DO $$
    DECLARE
      table_names TEXT[] := ARRAY[
        'objects', 'tenant_registry', 'regulatory_profiles', 'ios_signing_keys',
        'evidence_packages', 'gate_decisions', 'evidence_source_manifest',
        'quarantine_records', 'merkle_roots', 'rag_sources', 'rag_chunks',
        'agency_registry', 'uco_nodes', 'naics_decoder', 'code_crosswalk',
        'compliance_chains', 'tenant_naics_profiles', 'uco_evaluation_results',
        'filing_calendar', 'rag_vault_sector_partitions'
      ];
      t TEXT;
      exists_cnt INT;
    BEGIN
      FOREACH t IN ARRAY table_names LOOP
        SELECT COUNT(*) INTO exists_cnt 
        FROM information_schema.tables 
        WHERE table_schema = 'public' AND table_name = t;
        
        IF exists_cnt = 0 THEN
          RAISE EXCEPTION 'DATABASE INVARIANT VIOLATION: Required table % is missing.', t;
        END IF;
      END LOOP;
    END $$;

    -- 2. Check WORM triggers presence
    DO $$
    DECLARE
      trigger_checks TEXT[][] := ARRAY[
        ARRAY['worm_evidence_packages', 'evidence_packages'],
        ARRAY['worm_gate_decisions', 'gate_decisions'],
        ARRAY['worm_quarantine_records', 'quarantine_records'],
        ARRAY['worm_merkle_roots', 'merkle_roots']
      ];
      tc TEXT[];
      exists_cnt INT;
    BEGIN
      FOREACH tc SLICE 1 IN ARRAY trigger_checks LOOP
        SELECT COUNT(*) INTO exists_cnt 
        FROM information_schema.triggers 
        WHERE trigger_schema = 'public' 
          AND trigger_name = tc[1] 
          AND event_object_table = tc[2];
          
        IF exists_cnt = 0 THEN
          RAISE EXCEPTION 'DATABASE INVARIANT VIOLATION: WORM trigger % on table % is missing.', tc[1], tc[2];
        END IF;
      END LOOP;
    END $$;

    -- 3. Check roles exist
    DO $$
    DECLARE
      role_names TEXT[] := ARRAY[
        'ios_app', 'audit_writer', 'audit_reader', 'rag_reader', 'rag_writer'
      ];
      r TEXT;
      exists_cnt INT;
    BEGIN
      FOREACH r IN ARRAY role_names LOOP
        SELECT COUNT(*) INTO exists_cnt 
        FROM pg_roles 
        WHERE rolname = r;
        
        IF exists_cnt = 0 THEN
          RAISE EXCEPTION 'DATABASE INVARIANT VIOLATION: Required role % is missing.', r;
        END IF;
      END LOOP;
    END $$;

---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: ios-plus
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 2
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ios-plus"
        vault.hashicorp.com/agent-inject-secret-ios-plus.env: "secret/data/ios-plus/config"
        vault.hashicorp.com/agent-inject-template-ios-plus.env: |
          {{- with secret "secret/data/ios-plus/config" -}}
          {{- range $k, $v := .Data.data }}
          {{ $k }}={{ $v | quote }}
          {{- end }}
          {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ios-plus-sa
      containers:
        - name: flyway
          image: flyway/flyway:10
          command:
            - sh
            - -c
            - |
              # Source Vault dynamic secrets
              if [ -f /vault/secrets/ios-plus.env ]; then
                . /vault/secrets/ios-plus.env
              fi

              # Check database host is populated
              if [ -z "$COS_HOST" ]; then
                echo "ERROR: Database host (COS_HOST) is not set." >&2
                exit 1
              fi

              # Preflight check: Wait for database network reachability
              echo "Waiting for database connection at ${COS_HOST}:${COS_PORT:-5432}..."
              for i in $(seq 1 30); do
                # Use standard dev/tcp bash connection check
                if (echo > /dev/tcp/${COS_HOST}/${COS_PORT:-5432}) >/dev/null 2>&1; then
                  echo "Database port is reachable."
                  break
                fi
                echo "Database not reachable yet. Retrying in 2s..."
                sleep 2
              done

              # Execute Flyway Migration dynamically
              echo "Attempting direct migrations against ${COS_HOST}..."
              if flyway -url="jdbc:postgresql://${COS_HOST}:${COS_PORT:-5432}/${COS_DATABASE:-ios_plus}" \
                     -user=cos_admin \
                     -password="${COS_PASSWORD_COS_ADMIN}" \
                     -connectRetries=10 \
                     migrate; then
                echo "Direct migration completed successfully."
              else
                echo "Direct migration failed (pre-existing schema detected). Baselining at version 4..."
                flyway -url="jdbc:postgresql://${COS_HOST}:${COS_PORT:-5432}/${COS_DATABASE:-ios_plus}" \
                       -user=cos_admin \
                       -password="${COS_PASSWORD_COS_ADMIN}" \
                       -connectRetries=10 \
                       baseline -baselineVersion=4
                
                echo "Retrying migration after baselining..."
                flyway -url="jdbc:postgresql://${COS_HOST}:${COS_PORT:-5432}/${COS_DATABASE:-ios_plus}" \
                       -user=cos_admin \
                       -password="${COS_PASSWORD_COS_ADMIN}" \
                       -connectRetries=10 \
                       migrate
              fi

          volumeMounts:
            - name: migrations-vol
              mountPath: /flyway/sql
      volumes:
        - name: migrations-vol
          configMap:
            name: db-migrations-config
