# ============================================================================
# IOS+ Platform — ML Jobs (CronJob)
# ============================================================================
# Risk scoring (every 6 hours), drift detection (daily), and accreditation
# load indexing (weekly). Cloud SQL Auth Proxy sidecar for DB writes.
# Pub/Sub publisher for async downstream events.
# ============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ios-plus-ml-risk-scoring
  namespace: ml-jobs
  labels:
    app.kubernetes.io/name: ios-plus-ml-jobs
    app.kubernetes.io/component: ml-jobs
    app.kubernetes.io/version: "v2.0.0"
    cost-center: lamar-cos
    tier: analytics
spec:
  schedule: "0 */6 * * *"
  timeZone: "America/Chicago"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ios-plus-ml-jobs
            app.kubernetes.io/component: ml-jobs
            cost-center: lamar-cos
        spec:
          serviceAccountName: ios-plus-ml-jobs-sa
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ios-plus-ml-jobs
              image: ios-plus-ml-jobs
              imagePullPolicy: Always
              env:
                - name: MODE
                  value: "risk-scoring"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-ml-jobs-secrets
                      key: DATABASE_URL
                - name: REDIS_HOST
                  valueFrom:
                    secretKeyRef:
                      name: ios-plus-ml-jobs-secrets
                      key: REDIS_HOST
                - name: PUBSUB_PROJECT_ID
                  value: "lamar-cos"
                - name: PUBSUB_TOPIC_ML_EVENTS
                  value: "ios-plus-ml-events"
                - name: NODE_ENV
                  value: "production"
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 4000m
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp

            - name: cloudsql-auth-proxy
              image: cloudsql-auth-proxy
              imagePullPolicy: Always
              command:
                - "/cloud-sql-proxy"
                - "--private-ip"
                - "--structured-logs"
                - "--port=5432"
                - "lamar-cos:us-central1:cos-db"
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              ports:
                - name: cloudsql
                  containerPort: 5432
                  protocol: TCP
              volumeMounts:
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 100Mi
          restartPolicy: OnFailure

---

