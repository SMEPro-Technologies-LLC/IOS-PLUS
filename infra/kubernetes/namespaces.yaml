# ============================================================================
# IOS+ Platform — Namespace Configuration
# ============================================================================
# GKE production-grade namespaces aligned to the v2 engine architecture.
# Each namespace includes: ResourceQuota, LimitRange, NetworkPolicy,
# SecurityContext labels, and cost-center / environment metadata.
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: connector-ingestion
  labels:
    cost-center: lamar-cos
    environment: production
    tier: ingestion
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    iosplus.io/layer: connector-ingestion
    iosplus.io/purpose: "campus system connectors, regulatory crawlers, AI service connectors"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: connector-ingestion-quota
  namespace: connector-ingestion
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "0"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: connector-ingestion-limits
  namespace: connector-ingestion
spec:
  limits:
    - default:
        cpu: "1000m"
        memory: "1Gi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
      max:
        cpu: "4000m"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      type: Container
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: connector-ingestion-netpol
  namespace: connector-ingestion
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: api-gateway
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: monitoring
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: api-gateway
    - to:
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: trust-model
    - to:
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: monitoring
    - to: [] # Allow DNS and external APIs (Pub/Sub, Cloud SQL, etc.)
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---

