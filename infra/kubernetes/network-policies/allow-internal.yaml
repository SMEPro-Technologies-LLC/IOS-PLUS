# ============================================================================
# IOS+ Platform — Allow Internal Inter-Namespace Communication
# ============================================================================
# Approved data-flow paths between engine layers. Deny by default;
# allow only the specific communication paths required by the v2 architecture.
# ============================================================================

# api-gateway -> trust-model (canonical queries, UDM reads, evidence chain)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-trust-model
  namespace: trust-model
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ios-plus-trust-model
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              iosplus.io/layer: api-gateway
      ports:
        - protocol: TCP
          port: 3000

---
