# ============================================================================
# IOS+ Platform — Default Deny Network Policies
# ============================================================================
# Default deny-all ingress/egress for all platform namespaces.
# Applied as a baseline; explicit allow policies override per namespace.
# ============================================================================

# Default deny ingress for all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: connector-ingestion
spec:
  podSelector: {}
  policyTypes:
    - Ingress
