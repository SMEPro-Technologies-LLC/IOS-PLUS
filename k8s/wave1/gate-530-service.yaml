# ------------------------------------------------------------------------
# Wave 1 MVP — Kubernetes Service
# ClusterIP for internal communication; Ingress handles external traffic
# ------------------------------------------------------------------------

apiVersion: v1
kind: Service
metadata:
  name: gate-530-api
  namespace: api-gateway
  labels:
    app: gate-530-api
    version: wave1
spec:
  type: ClusterIP
  selector:
    app: gate-530-api
    version: wave1
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
