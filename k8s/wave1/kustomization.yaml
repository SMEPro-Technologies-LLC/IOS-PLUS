# ------------------------------------------------------------------------
# Wave 1 MVP — Kustomize Base
# Apply with: kubectl apply -k k8s/wave1
# ------------------------------------------------------------------------

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: api-gateway

resources:
  - gate-530-deployment.yaml
  - gate-530-service.yaml
  - gate-530-configmap.yaml

commonLabels:
  app.kubernetes.io/name: gate-530-api
  app.kubernetes.io/part-of: ios-plus
  app.kubernetes.io/managed-by: kustomize
  wave: "1"

images:
  - name: gcr.io/PROJECT_ID/gate-530-api
    newTag: wave1-v1.0.0

replicas:
  - name: gate-530-api
    count: 1
