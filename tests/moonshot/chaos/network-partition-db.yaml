apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: moonshot-network-partition-db
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - ios-plus
    labelSelectors:
      app: middleware-engine
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - ios-plus
      labelSelectors:
        app: cos-plus
  duration: "45s"
